name: Build

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 */2 * *'

env:
  INTERNAL_NAME: Ktisis
  CONFIGURATION: Release

jobs:
  check-for-changes:
    runs-on: windows-2022
    outputs:
      should-run: ${{steps.check_changes.outputs.should_run}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Last Run Timestamp
        id: lastrun
        run: |
          $WorkflowFile = "main.yml"
          $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?status=success&sort=updated&per_page=1"
          $req = Invoke-WebRequest -Uri $url
          $json = $req.Content | ConvertFrom-Json
          $timestamp = $json.workflow_runs[0].head_commit.timestamp
          # need to figure out this env?
          Write-Host "LAST_RUN_TIMESTAMP=$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Check Changes
        id: changecompare
        run: |
          Write-Host $Env:LAST_RUN_TIMESTAMP
          $commitsSinceLast = git log --since="{$env.LAST_RUN_TIMESTAMP} --pretty=oneline
          if($commitsSinceLast -gt 0){
            Write-Host "Commits since last run, will build"
            Write-Host "should_run=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }else{
            Write-Host "No new commits since last run, stopping action"
            Write-Host "should_run=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

  build:
    needs: check-for-changes
    if: ${{ needs.check-for-changes.outputs.should_run == 'true' }}
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
      - name: Download Dalamud for SDK
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"
      - name: Restore project
        run: dotnet restore ${{env.INTERNAL_NAME}}
      - name: Build Ktisis
        run: dotnet build -c $${{env.INTERNAL_NAME}}
      - name: Push artifcats
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            ${{env.INTERNAL_NAME}}\bin\Releases\${{env.INTERNAL_NAME}}

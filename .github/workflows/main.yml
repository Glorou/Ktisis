name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

env:
  INTERNAL_NAME: Ktisis
  CONFIGURATION: Release

jobs:
  check-for-changes:
    runs-on: windows-2022
    outputs:
      should-run: ${{steps.check_changes.outputs.should_run}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Last Run Timestamp and Compare
        id: lastrun
        run: |
          $WorkflowFile = "main.yml"
          $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WorkflowFile}/runs?status=success&sort=updated&per_page=1"
          $req = Invoke-WebRequest -Uri $url
          $json = $req.Content | ConvertFrom-Json
          $timestamp = $json.workflow_runs[0].head_commit.timestamp
          $commitsSinceLast = git log --since="{$timestamp}" --pretty=oneline
          if($commitsSinceLast -gt 0){
            Write-Host "Commits since last run, will build"
            $env:GITHUB_ENV += "should_run=true"
          }else{
            Write-Host "No new commits since last run, stopping action"
            $env:GITHUB_ENV += "should_run=false" 
          }


  build:
    needs: check-for-changes
    if: ${{ needs.check-for-changes.outputs.should_run == 'true' }}
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
      - name: Download Dalamud for SDK
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"
      - name: Restore project
        run: dotnet restore ${{env.INTERNAL_NAME}}
      - name: Build Ktisis
        run: dotnet build -c $${{env.INTERNAL_NAME}}
      - name: Push artifcats
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            ${{env.INTERNAL_NAME}}\bin\Releases\${{env.INTERNAL_NAME}}
